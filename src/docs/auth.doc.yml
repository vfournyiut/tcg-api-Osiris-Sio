paths:
  /api/auth/sign-up:
    post:
      summary: Inscription d'un nouvel utilisateur
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
            examples:
              ValidUser:
                summary: Inscription valide
                value:
                  username: 'ash'
                  email: 'ash@example.com'
                  password: 'password123'
              MissingFields:
                summary: Données manquantes
                value:
                  username: 'ash'
                  # email et password manquants
              InvalidEmail:
                summary: Email invalide
                value:
                  username: 'ash'
                  email: 'invalid-email'
                  password: 'password123'
              ExistingEmail:
                summary: Email déjà utilisé
                value:
                  username: 'Test User'
                  email: 'red@example.com'
                  password: 'password123'
      responses:
        201:
          description: Inscription réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        400:
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                MissingData:
                  summary: Données manquantes
                  value:
                    error: 'Données manquantes/invalides. (username, email et password sont requis et doivent être des chaînes de caractères)'
                InvalidEmail:
                  summary: Format email incorrect
                  value:
                    error: 'Email invalide.'
        409:
          description: Conflit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                EmailExists:
                  summary: Email déjà utilisé
                  value:
                    error: 'Email déjà utilisé'
        500:
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Erreur serveur'

  /api/auth/sign-in:
    post:
      summary: Connexion utilisateur
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
            examples:
              ValidUser:
                summary: Connexion valide
                value:
                  email: 'red@example.com'
                  password: 'password123'
              MissingFields:
                summary: Données manquantes
                value:
                  email: 'red@example.com'
                  # password manquant
              InvalidCredentials:
                summary: Identifiants incorrects
                value:
                  email: 'nored@example.com'
                  password: 'password123'
              InvalidPassword:
                summary: Mot de passe incorrect
                value:
                  email: 'red@example.com'
                  password: 'password'
      responses:
        200:
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        400:
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                MissingData:
                  summary: Données manquantes
                  value:
                    error: 'Données manquantes/invalides. (email et password sont requis et doivent être des chaînes de caractères)'
        401:
          description: Échec d'authentification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                UserNotFound:
                  summary: Utilisateur inexistant
                  value:
                    error: 'Email ou mot de passe incorrect'
                InvalidPassword:
                  summary: Mot de passe incorrect
                  value:
                    error: 'Email ou mot de passe incorrect'
        500:
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Erreur serveur'
